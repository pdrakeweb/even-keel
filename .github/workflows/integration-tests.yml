name: Integration tests

# Runs the pytest-bdd Gherkin harness in tests/ against a real
# Mosquitto broker. Virtual mode only — HIL and live modes need
# physical hardware. The harness is the contract layer between
# Pete's plain-English requirements and the simulator/firmware
# implementations; if these go red, the data-plane is broken.

on:
  push:
    branches: [master, main]
    paths:
      - "tests/**"
      - "simulator/**"
      - "custom-card/**"
      - "home-assistant/**"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    paths:
      - "tests/**"
      - "simulator/**"
      - "custom-card/**"
      - "home-assistant/**"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:

jobs:
  bdd:
    name: pytest-bdd (virtual mode)
    runs-on: ubuntu-latest

    env:
      MQTT_BROKER: localhost
      MQTT_PORT: "1883"

    steps:
      - uses: actions/checkout@v4

      - name: Start Mosquitto
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v "$PWD/tests/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2

          # Wait up to ~30s for the broker to start accepting connections.
          for i in $(seq 1 30); do
            if docker exec mosquitto mosquitto_sub -h localhost -t '$SYS/#' -C 1 -W 2 >/dev/null 2>&1; then
              echo "broker ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::mosquitto did not come up in time"
          docker logs mosquitto
          exit 1

      - name: Start Home Assistant
        # Spins up the production HA Docker image against a copy of
        # the home-assistant/ tree with .storage stripped (so HA's
        # onboarding flow runs fresh). Pre-bakes a single config_entry
        # for the MQTT integration so HA subscribes to the local
        # mosquitto on first boot — the post-2023 HA UI-only flow API
        # turned out to be brittle from CI; pre-baking is deterministic
        # across HA versions as long as the storage shape holds.
        run: |
          mkdir -p /tmp/ha-config/.storage
          cp -r home-assistant/. /tmp/ha-config/
          rm -rf /tmp/ha-config/.storage  # fresh user storage
          mkdir -p /tmp/ha-config/.storage
          cp /tmp/ha-config/secrets.yaml.example /tmp/ha-config/secrets.yaml
          sed -i 's|REPLACE_ME|ci-test-secret-12345|g' /tmp/ha-config/secrets.yaml

          # Pre-bake the MQTT integration entry. HA reads
          # .storage/core.config_entries on boot and sets up integrations
          # before the onboarding flow runs.
          python3 - <<'PY'
          import json, uuid
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc).isoformat()
          entry = {
              "entry_id": uuid.uuid4().hex,
              "version": 1,
              "minor_version": 2,
              "domain": "mqtt",
              "title": "Mosquitto (CI)",
              "data": {
                  "broker": "localhost",
                  "port": 1883,
                  "discovery": True,
                  "discovery_prefix": "homeassistant"
              },
              "options": {},
              "pref_disable_new_entities": False,
              "pref_disable_polling": False,
              "source": "user",
              "unique_id": None,
              "disabled_by": None,
              "created_at": now,
              "modified_at": now,
              "discovery_keys": {},
              "subentries": []
          }
          payload = {
              "version": 1,
              "minor_version": 5,
              "key": "core.config_entries",
              "data": {"entries": [entry]}
          }
          with open("/tmp/ha-config/.storage/core.config_entries", "w") as f:
              json.dump(payload, f, indent=2)
          print("pre-baked MQTT config entry:", entry["entry_id"])
          PY

          docker run -d --name homeassistant \
            --network host \
            -v /tmp/ha-config:/config \
            -e TZ=America/Detroit \
            ghcr.io/home-assistant/home-assistant:stable

          # HA cold-start takes ~45 s. Poll up to 120 s.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8123/manifest.json || echo "000")
            if [ "$code" = "200" ]; then
              echo "HA ready (after ${i}×2s)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Home Assistant did not come up in time"
          docker logs homeassistant | tail -100
          exit 1

      - name: Bootstrap HA onboarding + access token
        id: ha-bootstrap
        run: |
          # Step 1 — create the owner user. Onboarding endpoints are
          # unauthenticated only on a freshly-installed HA instance.
          USER_RES=$(curl -s -X POST http://localhost:8123/api/onboarding/users \
            -H "Content-Type: application/json" \
            -d '{
              "client_id":"http://localhost:8123/",
              "name":"CI Test",
              "username":"ci",
              "password":"ci-test-12345",
              "language":"en"
            }')
          AUTH_CODE=$(echo "$USER_RES" | python -c "import json,sys;print(json.load(sys.stdin).get('auth_code',''))")
          if [ -z "$AUTH_CODE" ]; then
            echo "::error::onboarding/users failed: $USER_RES"
            exit 1
          fi

          # Step 2 — exchange the auth code for an access token.
          TOKEN_RES=$(curl -s -X POST http://localhost:8123/auth/token \
            -d "client_id=http://localhost:8123/&grant_type=authorization_code&code=$AUTH_CODE")
          HA_TOKEN=$(echo "$TOKEN_RES" | python -c "import json,sys;print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "$HA_TOKEN" ]; then
            echo "::error::token exchange failed: $TOKEN_RES"
            exit 1
          fi

          # Mask before exporting; GH Actions auto-redacts in logs.
          echo "::add-mask::$HA_TOKEN"
          echo "HA_TOKEN=$HA_TOKEN" >> "$GITHUB_ENV"
          echo "HA_URL=http://localhost:8123" >> "$GITHUB_ENV"
          echo "HA bootstrap complete"

      - name: Wait for HA MQTT integration to settle
        # MQTT integration is pre-baked in .storage/core.config_entries
        # (see "Start Home Assistant" step). HA loads it during boot;
        # by the time /manifest.json responds, MQTT is connected to
        # mosquitto and subscribed to the homeassistant/# discovery
        # tree. A short pause lets discovery topic subscription settle
        # before the test harness publishes the first discovery payload.
        run: sleep 3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            tests/requirements.txt
            simulator/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: custom-card/package-lock.json

      - name: Build the custom-card bundle
        # Playwright e2e tests load custom-card/dist/evenkeel-boat-card.js.
        # Rebuild from the current source so a stale tracked dist doesn't
        # mask regressions.
        working-directory: custom-card
        run: |
          npm ci
          npm run build

      - name: Install simulator (editable)
        run: pip install -e ./simulator

      - name: Install test deps
        run: pip install -r tests/requirements.txt

      - name: Install Playwright Chromium
        # The pytest-playwright tests in tests/test_card_e2e.py launch a
        # real browser. ~150 MB; cached by setup-python's pip cache hit
        # rate isn't great here so we cache the browser explicitly.
        run: python -m playwright install --with-deps chromium

      - name: Diagnostic — HA + MQTT state
        # Help future-me (or another agent) diagnose without admin log
        # access. Lists boat-related HA entities + retained MQTT
        # discovery topics. The Python is in a separate script file
        # so YAML indentation doesn't decide it's a new top-level key.
        run: |
          cat > /tmp/list-boat-entities.py <<'PYEOF'
          import json, sys
          data = json.load(sys.stdin)
          boat = [s for s in data if "boat" in s.get("entity_id", "") or "evenkeel" in s.get("entity_id", "")]
          print(f"{len(boat)} boat-related entities of {len(data)} total")
          for s in boat[:30]:
              print(f"  {s['entity_id']:55} = {str(s.get('state', '?'))[:40]}")
          PYEOF
          echo "===== HA states (boat-related) ====="
          curl -s -H "Authorization: Bearer $HA_TOKEN" http://localhost:8123/api/states \
            | python3 /tmp/list-boat-entities.py
          echo "===== Mosquitto retained discovery topics ====="
          docker exec mosquitto mosquitto_sub -h localhost -t 'homeassistant/#' -W 2 -v 2>/dev/null | head -20 || echo "(none)"
          echo "==============================="

      - name: Run pytest (BDD + simulator integration, no HA)
        # Excludes both the Playwright suite and the HA-bridged
        # bilge_alarm_minimal scenarios so a real BDD/simulator
        # regression isn't tangled up with HA setup wobbles.
        # Tee output to a file so failures are visible in the failure-
        # summary step below even when the workflow log API is opaque.
        working-directory: tests
        run: |
          set -o pipefail
          pytest --ignore=test_card_e2e.py --ignore=test_bilge_alarm_minimal.py \
            -v --tb=long 2>&1 | tee /tmp/pytest-bdd.log
          exit ${PIPESTATUS[0]}

      - name: Echo pytest BDD failure summary as annotations
        # Workflow logs require admin auth to download via the API,
        # but `::error::` annotations are exposed via the public
        # check-runs/annotations endpoint. Emit the pytest summary
        # tail as annotation lines so failures are diagnosable from
        # outside.
        if: failure()
        run: |
          echo "===== last 80 lines of pytest output ====="
          tail -80 /tmp/pytest-bdd.log
          echo "===== emitting annotations ====="
          tail -30 /tmp/pytest-bdd.log | while IFS= read -r line; do
            # Strip ANSI for cleaner annotation text.
            clean=$(echo "$line" | sed 's/\x1b\[[0-9;]*m//g')
            echo "::error::pytest: $clean"
          done

      - name: Run pytest (HA-bridged scenarios)
        # Iteration 4B: bilge MQTT → HA binary_sensor flips. Isolated
        # so failures here are visible without hiding BDD/sim regressions.
        # `-rs` surfaces skip reasons so a silently-skipped test is
        # visible in the run summary.
        id: ha-pytest
        working-directory: tests
        run: |
          set -o pipefail
          pytest test_bilge_alarm_minimal.py -v --tb=long -rs 2>&1 | tee /tmp/pytest-ha.log
          exit ${PIPESTATUS[0]}

      - name: Echo HA-bridged failure tail as annotations
        # Same pattern as the BDD step — make failures visible via the
        # public check-runs annotations API.
        if: failure() && steps.ha-pytest.conclusion == 'failure'
        run: |
          echo "===== last 80 lines of HA pytest output ====="
          tail -80 /tmp/pytest-ha.log
          echo "===== emitting annotations ====="
          tail -30 /tmp/pytest-ha.log | while IFS= read -r line; do
            clean=$(echo "$line" | sed 's/\x1b\[[0-9;]*m//g')
            echo "::error::ha-pytest: $clean"
          done

      - name: Confirm HA scenarios ran (not silently skipped)
        # The whole point of the HA service container is to actually
        # exercise the bilge → HA path. If pytest skipped — usually
        # because HA_URL/HA_TOKEN didn't propagate — the workflow
        # technically passes but the assertion never happens. Catch
        # that as a real failure here.
        run: |
          if grep -E "(SKIPPED|skipped)" /tmp/pytest-ha.log >/dev/null; then
            echo "::error::HA-bridged scenarios were skipped — HA env vars not propagating to pytest?"
            tail -20 /tmp/pytest-ha.log
            exit 1
          fi
          if ! grep -E "passed" /tmp/pytest-ha.log >/dev/null; then
            echo "::error::HA-bridged step exited 0 but no 'passed' line found in output"
            cat /tmp/pytest-ha.log
            exit 1
          fi
          tail -3 /tmp/pytest-ha.log

      - name: Run pytest (Playwright e2e)
        # Real-browser regression suite for the boat card, against
        # the bundle rebuilt in the previous step.
        working-directory: tests
        run: pytest test_card_e2e.py -v --tb=short

      - name: Mosquitto logs (on failure)
        if: failure()
        run: docker logs mosquitto

      - name: Home Assistant logs (on failure)
        if: failure()
        run: docker logs homeassistant 2>&1 | tail -200 || true
