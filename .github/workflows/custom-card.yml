name: Custom card

on:
  push:
    branches: [master, main]
    paths:
      - "custom-card/**"
      - ".github/workflows/custom-card.yml"
  pull_request:
    paths:
      - "custom-card/**"
      - ".github/workflows/custom-card.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    defaults:
      run:
        working-directory: custom-card

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: custom-card/package-lock.json

      - run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

      - name: Vitest (config + utils + element rendering)
        run: npm run test -- --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Vite build
        run: npm run build

      - name: Verify bundle exists and is non-trivial
        run: |
          test -f dist/evenkeel-boat-card.js
          # Bundle should be at least 5 KB (Lit + our code)
          [ "$(stat -c%s dist/evenkeel-boat-card.js)" -gt 5000 ]

      - name: Upload built bundle
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: evenkeel-boat-card-bundle
          path: custom-card/dist/evenkeel-boat-card.js
          retention-days: 30

  release:
    # Cuts a Release tagged custom-card-vX.Y.Z when the package.json
    # version on master changes. HACS users install from these releases.
    name: Release (master only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: version
        working-directory: custom-card
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          # If this commit didn't touch package.json's version, exit cleanly.
          if git diff --name-only HEAD~1 HEAD -- package.json | grep -q package.json; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.version.outputs.version_changed == 'true'
        uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: custom-card/package-lock.json }

      - if: steps.version.outputs.version_changed == 'true'
        working-directory: custom-card
        run: npm ci && npm run build

      - if: steps.version.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: custom-card-v${{ steps.version.outputs.version }}
          name: EvenKeel Boat Card v${{ steps.version.outputs.version }}
          body: |
            HACS-installable build of `evenkeel-boat-card`.
            See [custom-card/README.md](https://github.com/${{ github.repository }}/blob/master/custom-card/README.md).
          files: custom-card/dist/evenkeel-boat-card.js
