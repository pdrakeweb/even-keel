name: HACS validate

# Runs the official HACS action against the repo to confirm the
# Lovelace plugin metadata at /hacs.json + /info.md is shaped the
# way HACS expects. Catches drift before users hit "install" and
# get a confusing error.
#
# NOTE: HACS also requires the GitHub repository itself to be
# configured with a description and at least one topic. Add topics
# at Settings → General → Topics, e.g. `home-assistant`, `hacs`,
# `lovelace`, `sailboat`, `marine`. Without topics this workflow
# fails — by design, that's a real HACS-install-time problem.
#
# We DO NOT trigger this on push to master because it depends on
# external repo settings the workflow can't change. Run it on PRs
# (where it advises) and on demand (workflow_dispatch).

on:
  pull_request:
    paths:
      - "hacs.json"
      - "info.md"
      - "custom-card/**"
      - ".github/workflows/hacs-validate.yml"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS metadata validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: plugin
          ignore: brands
