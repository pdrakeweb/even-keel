# Base package: logger + native API + OTA + WiFi.
#
# WiFi declares three known networks (boat hotspot, marina guest,
# Pete's home) and falls back to a captive AP for first-run config.
# Secrets live in firmware/secrets.yaml (gitignored) — see
# secrets.yaml.example for the keys this package consumes.

logger:
  level: INFO
  baud_rate: 115200

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid_boat
      password: !secret wifi_password_boat
    - ssid: !secret wifi_ssid_marina
      password: !secret wifi_password_marina
    - ssid: !secret wifi_ssid_home
      password: !secret wifi_password_home
  fast_connect: false
  power_save_mode: light
  ap:
    ssid: "BoatMon Setup"
    password: !secret ap_fallback_password

captive_portal:
