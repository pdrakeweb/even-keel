# Wokwi simulator config for the BoatMon-1 firmware.
#
# Paths are relative to this file (tests/wokwi/wokwi.toml). ESPHome
# writes its build output to <yaml-dir>/.esphome/build/<device-name>/...
# so when boat-mon.yaml lives in firmware/, the artifacts end up at
# firmware/.esphome/build/boatmon-1/.pioenvs/boatmon-1/.
[wokwi]
version = 1
# Wokwi smoke test runs the slim boat-mon-wokwi.yaml build (base +
# network + health only) so the full 8-package production firmware
# doesn't time out under simulation. Both share the same on_boot
# "BoatMon-1 booted" contract.
firmware = "../../firmware/.esphome/build/boatmon-wokwi/.pioenvs/boatmon-wokwi/firmware.factory.bin"
elf      = "../../firmware/.esphome/build/boatmon-wokwi/.pioenvs/boatmon-wokwi/firmware.elf"
